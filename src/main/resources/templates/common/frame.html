<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:fragment="frame_html(links,app,scripts)">

<head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>

    <meta name="renderer" content="webkit"/>
    <meta name="force-rendering" content="webkit"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <meta name="author" content="wuluknut@gmail.com">

    <title th:text="${title != null ? title + ' - ' : ''} + #{site.suffix}"></title>

    <link rel="icon" type="image/x-icon" href="/favicon.ico"/>

    <link href="/webjars/layui/2.9.3/dist/css/layui.css" rel="stylesheet">

    <th:block th:replace="${links}"/>

    <!-- 旧版 Internet Explorer 升级提示 -->
    <script>
        if (/*@cc_on!@*/ false || (!!window.MSInputMethodContext && !!document.documentMode)) // eslint-disable-line spaced-comment
            document.write('\x3Cscript id="_iealwn_js" data-outver="11" src="https://support.dmeng.net/ie-alert-warning/latest.js">\x3C/script>')
    </script>
</head>

<body>
<noscript>
    <div style="text-align: center;">
        <strong>
            很抱歉，如果没有启用JavaScript，此网站将无法正常运行。请启用它。
        </strong>
    </div>
    <div style="text-align: center;">
        <strong>
            We're sorry but website doesn't work properly without JavaScript enabled. Please enable it to continue.
        </strong>
    </div>
</noscript>
<th:block th:replace="${app}"/>
<script src="/webjars/layui/2.9.3/dist/layui.js"></script>
<script src="/webjars/dayjs/1.11.10/dayjs.min.js"></script>
<script src="/webjars/dayjs/1.11.10/locale/zh-cn.js"></script>
<th:block th:replace="${scripts}"/>
</body>

</html>
